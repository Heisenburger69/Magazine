<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE Council - Rising Stars Magazine</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" type="image/png" href="assets/images/decorative.png?v=1">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/decorative.png?v=1">
    <link rel="icon" type="image/png" sizes="64x64" href="assets/images/decorative.png?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/decorative.png?v=1">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
        .cse-header { background: linear-gradient(135deg, var(--primary-black) 0%, #1a1a2e 100%); padding: 60px 20px; text-align: center; }
        .cse-header h1 { color: var(--primary-gold); margin-bottom: 10px; }
        .cse-header p { color: rgba(255,255,255,0.7); }
        .cse-head { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 20px; padding: 16px; background: rgba(201,168,76,0.15); border-radius: 12px; border: 2px solid var(--primary-gold); max-width: 350px; margin: 20px auto 0; cursor: pointer; }
        .cse-head img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-gold); }
        .cse-head-info .label { font-size: 10px; color: var(--primary-gold); text-transform: uppercase; }
        .cse-head-info .name { color: #fff; font-size: 14px; font-weight: 700; }
        .cse-content { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .stage-section { margin-bottom: 40px; }
        .stage-title { font-size: 20px; color: var(--primary-gold); margin-bottom: 20px; text-align: center; text-transform: uppercase; padding: 12px; }
        .stage-title.sec { background: #1a1a1a; color: #fff; }
        .stage-title.prep { background: #1B4D3E; color: #fff; }
        .stage-title.pri { background: #2C5282; color: #fff; }
@media (min-width: 769px) {
            .cse-grid { 
                display: grid; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 16px; 
            }
            .cse-grid .cse-card[data-col="1"] { grid-column: 1; }
            .cse-grid .cse-card[data-col="2"] { grid-column: 2; }
            .cse-grid .cse-card[data-col="3"] { grid-column: 3; }
        }
        @media (max-width: 768px) {
            .cse-grid { 
                display: grid; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 8px; 
            }
            .cse-grid .cse-card[data-col="1"] { grid-column: 1; }
            .cse-grid .cse-card[data-col="2"] { grid-column: 2; }
            .cse-grid .cse-card[data-col="3"] { grid-column: 3; }
            .cse-content { padding: 20px 10px; }
            .cse-header { padding: 40px 15px; }
            .cse-header h1 { font-size: 24px; }
            .cse-card { padding: 8px; }
            .cse-card img { width: 32px; height: 32px; border-width: 2px; }
            .cse-card .role-icon { font-size: 14px; }
            .cse-card .role-title { font-size: 7px; }
            .cse-card .role-name { font-size: 9px; }
            .cse-card .role-badge { font-size: 6px; padding: 2px 6px; }
            .stage-title { font-size: 14px; padding: 8px; margin-bottom: 12px; }
        }
        .cse-card { 
            background: var(--bg-white); 
            border-radius: 10px; 
            padding: 16px; 
            text-align: center; 
            box-shadow: var(--shadow-sm);
            cursor: pointer; 
        }
        .cse-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .cse-card.empty { background: #f5f5f5; cursor: default; }
        .cse-card.empty:hover { transform: none; }
        .cse-card img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid var(--primary-gold); }
        .cse-card .role-icon { font-size: 20px; margin-bottom: 4px; }
        .cse-card .role-title { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .cse-card .role-name { font-size: 12px; font-weight: 600; }
        .cse-card .role-badge { display: inline-block; background: var(--primary-gold); color: #000; font-size: 8px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
        .stage-sec .cse-card { border-color: #333; }
        .stage-sec .cse-card img { border-color: #333; }
        .stage-prep .cse-card { border-color: #2A6B54; }
        .stage-prep .cse-card img { border-color: #2A6B54; }
        .stage-pri .cse-card { border-color: #4299E1; }
        .stage-pri .cse-card img { border-color: #4299E1; }
    </style>
</head>
<body>
    <div class="bg-stars"></div>
    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="Logo"></a>
            <a href="javascript:void(0)" onclick="window.history.back()" class="btn btn-primary" style="padding:8px 16px;font-size:12px;">&larr; Back</a>
        </div>
    </nav>
    <div class="cse-header">
        <h1>CSE Council</h1>
        <p>Cultural, Scientific & Educational Council</p>
        <div class="cse-head" id="cseHead">
            <img src="" alt="Council Head" id="cseHeadImg" style="display:none;">
            <div class="cse-head-info">
                <div class="label">Council Head</div>
                <div class="name">Miss Somia</div>
            </div>
        </div>
    </div>
    <section class="cse-content">
        <div class="stage-section stage-sec">
            <h2 class="stage-title sec">Secondary</h2>
            <div class="cse-grid" id="secondaryGrid"></div>
        </div>
        <div class="stage-section stage-prep">
            <h2 class="stage-title prep">Preparatory</h2>
            <div class="cse-grid" id="preparatoryGrid"></div>
        </div>
        <div class="stage-section stage-pri">
            <h2 class="stage-title pri">Primary</h2>
            <div class="cse-grid" id="primaryGrid"></div>
        </div>
    </section>
    <footer class="footer">
        <div class="container">
            <p><strong>THE RISING TIMES NEWS</strong></p>
            <p>Rising Stars Language School</p>
            <p>&copy; 2026 All Rights Reserved</p>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script>
        const roles = [
            { key: 'president', title: 'President', icon: '👑' },
            { key: 'vicePresident', title: 'Vice President', icon: '⭐' },
            { key: 'science', title: 'Science', icon: '🔬' },
            { key: 'religiousCulture', title: 'Religious & Culture', icon: '🕌' },
            { key: 'art', title: 'Art', icon: '🎨' },
            { key: 'social', title: 'Social', icon: '🤝' },
            { key: 'sports', title: 'Sports', icon: '🏆' }
        ];
        
        function getOrderedRoles() {
            return [
                { key: 'president', title: 'President', icon: '👑', col: 2 },
                { key: 'science', title: 'Science', icon: '🔬', col: 1 },
                { key: 'vicePresident', title: 'Vice President', icon: '⭐', col: 2 },
                { key: 'social', title: 'Social', icon: '🤝', col: 3 },
                { key: 'religiousCulture', title: 'Religious & Culture', icon: '🕌', col: 1 },
                { key: 'sports', title: 'Sports', icon: '🏆', col: 2 },
                { key: 'art', title: 'Art', icon: '🎨', col: 3 }
            ];
        }
        
        function renderCard(role, studentName) {
            const student = studentName ? DataStore.getStudent(studentName) : null;
            if (studentName && student) {
                return `<div class="cse-card" data-col="${role.col}" onclick="viewStudent('${studentName}')">
                    <img src="${student.image || ''}" alt="${studentName}" onerror="this.style.display='none'">
                    <div class="role-icon">${role.icon}</div>
                    <div class="role-title">${role.title}</div>
                    <div class="role-name">${studentName}</div>
                </div>`;
            }
            return `<div class="cse-card empty" data-col="${role.col}"><div class="role-icon">${role.icon}</div><div class="role-title">${role.title}</div><div class="role-name" style="color:#999;font-style:italic;">Vacant</div></div>`;
        }
        async function init() {
            await DataStore.load();
            renderCSECouncil();
        }
        function renderCSECouncil() {
            const council = DataStore.getCSECouncil();
            const headName = council.head || 'Miss Somia';
            const headStudent = DataStore.getStudent(headName);
            document.querySelector('#cseHead .name').textContent = headName;
            const headImg = document.getElementById('cseHeadImg');
            if (headStudent) {
                if (headStudent.image) { headImg.src = headStudent.image; headImg.style.display = 'block'; }
                document.getElementById('cseHead').onclick = () => viewStudent(headName);
                document.getElementById('cseHead').style.cursor = 'pointer';
            }
            const renderCard = (role, studentName) => {
                const student = studentName ? DataStore.getStudent(studentName) : null;
                if (studentName && student) {
                    return `<div class="cse-card" data-col="${role.col}" onclick="viewStudent('${studentName}')">
                        <img src="${student.image || ''}" alt="${studentName}" onerror="this.style.display='none'">
                        <div class="role-icon">${role.icon}</div>
                        <div class="role-title">${role.title}</div>
                        <div class="role-name">${studentName}</div>
                    </div>`;
                }
                return `<div class="cse-card empty" data-col="${role.col}"><div class="role-icon">${role.icon}</div><div class="role-title">${role.title}</div><div class="role-name" style="color:#999;font-style:italic;">Vacant</div></div>`;
            };
            ['secondary', 'preparatory', 'primary'].forEach(stage => {
                document.getElementById(stage + 'Grid').innerHTML = getOrderedRoles().map(role => renderCard(role, council.stages[stage][role.key])).join('');
            });
        }
        function viewStudent(name) { window.location.href = 'student.html?name=' + encodeURIComponent(name); }
        init();
    </script>
</body>
</html>
