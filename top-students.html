<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Students - Rising Stars Magazine</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .students-header { background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(245,244,240,0.9)); padding: 60px 20px; text-align: center; }
        .filter-bar { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; background: var(--bg-white); border: 2px solid transparent; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: var(--transition); }
        .filter-btn.active, .filter-btn:hover { border-color: var(--primary-gold); background: var(--primary-gold); }
        .student-card { background: var(--bg-white); border-radius: 12px; padding: 30px; text-align: center; box-shadow: var(--shadow-sm); transition: var(--transition); cursor: pointer; }
        .student-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }
        .student-card.star { background: linear-gradient(135deg, var(--primary-gold), #b8941f); border: 3px solid var(--primary-black); }
        .student-card img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-gold); margin-bottom: 16px; }
        .student-card.star img { border-color: var(--primary-black); }
        .student-card h3 { font-size: 18px; margin-bottom: 4px; }
        .student-card .role { font-size: 12px; color: #666; font-style: italic; margin-bottom: 12px; }
        .achievements { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 12px; }
        .achievement-tag { background: rgba(201,168,76,0.3); padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .student-card.star .achievement-tag { background: rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="bg-stars"></div>

    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="Logo"></a>
            <a href="index.html" class="btn btn-primary" style="padding:8px 16px;font-size:12px;">&larr; Home</a>
        </div>
    </nav>

    <div class="students-header">
        <h1>Star Students</h1>
        <p>Celebrating excellence at Rising Stars Language School</p>
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterStudents('all')">All</button>
            <button class="filter-btn" onclick="filterStudents('star')">★ Stars</button>
            <button class="filter-btn" onclick="filterStudents('Preparatory')">Preparatory</button>
            <button class="filter-btn" onclick="filterStudents('Secondary')">Secondary</button>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="grid grid-3" id="studentsGrid"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p><strong>THE RISING TIMES NEWS</strong></p>
            <p>Rising Stars Language School</p>
            <p>&copy; 2024 All Rights Reserved</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        let currentFilter = 'all';

        async function init() {
            await DataStore.load();
            renderStudents();
        }

        function filterStudents(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderStudents();
        }

        function renderStudents() {
            let students = DataStore.getStudents();
            if (currentFilter === 'star') students = students.filter(s => s.star);
            else if (currentFilter === 'Preparatory' || currentFilter === 'Secondary') students = students.filter(s => s.class === currentFilter);

            const grid = document.getElementById('studentsGrid');
            if (!students.length) {
                grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">No students found.</p>';
                return;
            }

            grid.innerHTML = students.map(s => {
                const isStar = s.star;
                const achievements = s.achievements ? s.achievements.map(a => `<span class="achievement-tag">${a}</span>`).join('') : '';
                return `
                    <div class="student-card ${isStar ? 'star' : ''}" onclick="viewStudent('${s.name}')">
                        <img src="${s.image || ''}" alt="${s.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27140%27 height=%27140%27%3E%3Ccircle cx=%2770%27 cy=%2770%27 r=%2770%27 fill=%27%23ddd%27/%3E%3C/svg%3E'">
                        <h3>${s.name}${isStar ? '<span class="star-badge">★ STAR</span>' : ''}</h3>
                        <p class="role">${s.role || ''}</p>
                        <div class="achievements">${achievements}</div>
                    </div>`;
            }).join('');
        }

        function viewStudent(name) {
            window.location.href = 'student.html?name=' + encodeURIComponent(name);
        }

        init();
    </script>
</body>
</html>
