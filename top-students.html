<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars - Rising Stars Magazine</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .students-header { background: linear-gradient(135deg, var(--primary-black) 0%, #2a2520 100%); padding: 70px 20px; text-align: center; }
        .students-header h1 { color: var(--primary-gold); text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .students-header p { color: rgba(255,255,255,0.7); }
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: var(--transition); color: rgba(255,255,255,0.8); }
        .filter-btn.active, .filter-btn:hover { border-color: var(--primary-gold); background: var(--primary-gold); color: var(--primary-black); }
        .students-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        @media (min-width: 1024px) { .students-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (max-width: 768px) { .students-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
        @media (max-width: 480px) { .students-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
        .student-card { background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(245,244,240,0.9) 100%); border-radius: 12px; padding: 20px; text-align: center; box-shadow: var(--shadow-md); transition: var(--transition); cursor: pointer; border: 1px solid rgba(0,0,0,0.06); }
        .student-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        
        /* Base star style - gold border */
        .student-card.star { border: 3px solid var(--primary-gold); box-shadow: 0 0 20px rgba(201,168,76,0.6); }
        .student-card.star.teacher { background: linear-gradient(145deg, #722F37 0%, #4A1F29 100%); border-color: var(--primary-gold); }
        .student-card.star.secondary { background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 100%); border-color: var(--primary-gold); box-shadow: 0 0 0 3px #333, 0 0 25px rgba(201,168,76,0.6); }
        .student-card.star.preparatory { background: linear-gradient(145deg, #1B4D3E 0%, #0F2E25 100%); border-color: var(--primary-gold); box-shadow: 0 0 0 3px #2A6B54, 0 0 25px rgba(201,168,76,0.6); }
        .student-card.star.primary { background: linear-gradient(145deg, #2C5282 0%, #1A3652 100%); border-color: var(--primary-gold); box-shadow: 0 0 0 3px #4299E1, 0 0 25px rgba(201,168,76,0.6); }
        .student-card.star.teacher { box-shadow: 0 0 0 3px #922B3E, 0 0 25px rgba(201,168,76,0.6); }
        
        .student-card.star h3 { color: var(--primary-gold); }
        .student-card.star .role { color: rgba(255,255,255,0.7); }
        .student-card.star .class-badge { background: var(--primary-gold); color: var(--primary-black); }
        
        /* Teacher colors */
        .student-card.teacher { background: linear-gradient(145deg, #722F37 0%, #4A1F29 100%); border: 2px solid #922B3E; color: #fff; }
        .student-card.teacher h3 { color: #fff; }
        .student-card.teacher .role { color: rgba(255,255,255,0.8); }
        .student-card.teacher .class-badge { background: #922B3E; color: #fff; }
        
        /* Secondary */
        .student-card.secondary { background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 100%); border: 2px solid #333; color: #fff; }
        .student-card.secondary h3 { color: #fff; }
        .student-card.secondary .class-badge { background: #333; color: #fff; }
        
        /* Preparatory */
        .student-card.preparatory { background: linear-gradient(145deg, #1B4D3E 0%, #0F2E25 100%); border: 2px solid #2A6B54; color: #fff; }
        .student-card.preparatory h3 { color: #fff; }
        .student-card.preparatory .class-badge { background: #2A6B54; color: #fff; }
        
        /* Primary */
        .student-card.primary { background: linear-gradient(145deg, #2C5282 0%, #1A3652 100%); border: 2px solid #4299E1; color: #fff; }
        .student-card.primary h3 { color: #fff; }
        .student-card.primary .class-badge { background: #4299E1; color: #fff; }
        
        .student-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-gold); margin-bottom: 12px; box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
        .student-card h3 { font-size: 14px; margin-bottom: 4px; }
        .student-card .role { font-size: 11px; color: #555; font-style: italic; margin-bottom: 8px; }
        .student-card .class-badge { display: inline-block; background: #8B3A5C; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .achievements { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 8px; }
        .achievement-tag { background: rgba(201,168,76,0.3); padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        .student-card.star .achievement-tag { background: rgba(0,0,0,0.15); color: #fff; }
        .search-input { width: 100%; max-width: 300px; padding: 10px 16px; border: 2px solid var(--primary-gold); border-radius: 20px; font-size: 14px; outline: none; margin-bottom: 20px; }
        .search-input:focus { box-shadow: 0 0 10px rgba(201,168,76,0.4); }
    </style>
</head>
<body>
    <div class="bg-stars"></div>

    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="Logo"></a>
            <a href="index.html" class="btn btn-primary" style="padding:8px 16px;font-size:12px;">&larr; Home</a>
        </div>
    </nav>

    <div class="students-header">
        <h1>Stars</h1>
        <p>Celebrating excellence at Rising Stars Language School</p>
        <input type="text" id="searchInput" class="search-input" placeholder="Search students..." oninput="renderStudents()">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterStudents('all')">All</button>
            <button class="filter-btn" onclick="filterStudents('star')">★ Stars</button>
            <button class="filter-btn" onclick="filterStudents('teacher')">Teachers</button>
            <button class="filter-btn" onclick="filterStudents('student')">Students</button>
            <button class="filter-btn" onclick="filterStudents('Primary')">Primary</button>
            <button class="filter-btn" onclick="filterStudents('Preparatory')">Preparatory</button>
            <button class="filter-btn" onclick="filterStudents('Secondary')">Secondary</button>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="students-grid" id="studentsGrid"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p><strong>THE RISING TIMES NEWS</strong></p>
            <p>Rising Stars Language School</p>
            <p>&copy; 2024 All Rights Reserved</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        let currentFilter = 'all';

        async function init() {
            await DataStore.load();
            renderStudents();
        }

        function filterStudents(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderStudents();
        }

        function renderStudents() {
            let students = DataStore.getStudents();
            
            const searchTerm = (document.getElementById('searchInput')?.value || '').toLowerCase();
            if (searchTerm) {
                students = students.filter(s => s.name.toLowerCase().includes(searchTerm));
            }
            
            const priorityConfig = [
                { name: 'youssef', match: s => s.name.toLowerCase().includes('youssef') && !s.name.toLowerCase().includes('samy') },
                { name: 'ahmed alaa', match: s => s.name.toLowerCase().includes('alaadin') },
                { name: 'yassin', match: s => s.name.toLowerCase().includes('yassin') && !s.name.toLowerCase().includes('youssef') },
                { name: 'ahmed sabry', match: s => s.name.toLowerCase().includes('ahmed') && s.name.toLowerCase().includes('sabry') && !s.name.toLowerCase().includes('youssef') && !s.name.toLowerCase().includes('yassin') }
            ];
            
            const isPriority = (name) => priorityConfig.some(p => p.match({ name }));
            
            const getPriorityIndex = (name) => {
                for (let i = 0; i < priorityConfig.length; i++) {
                    if (priorityConfig[i].match({ name })) return i;
                }
                return -1;
            };
            
            const countEvents = (name) => {
                const events = DataStore.getEvents();
                let count = 0;
                events.forEach(e => {
                    if (e.elements) {
                        e.elements.forEach(el => {
                            if (el.students) {
                                el.students.forEach(s => {
                                    if (s.name && s.name.toLowerCase() === name.toLowerCase()) count++;
                                });
                            }
                            if (el.organizers) {
                                el.organizers.forEach(s => {
                                    if (s.name && s.name.toLowerCase() === name.toLowerCase()) count++;
                                });
                            }
                        });
                    }
                });
                return count;
            };
            
            if (currentFilter === 'all') {
                students = students.filter(s => s.type === 'student' || s.type === 'teacher');
            } else if (currentFilter === 'star') {
                students = students.filter(s => s.star && s.type === 'student');
            } else if (currentFilter === 'teacher') {
                students = students.filter(s => s.type === 'teacher');
            } else if (currentFilter === 'student') {
                students = students.filter(s => s.type === 'student');
            } else if (currentFilter === 'Primary' || currentFilter === 'Preparatory' || currentFilter === 'Secondary') {
                students = students.filter(s => s.class === currentFilter);
            }
            
            const priority = students.filter(s => getPriorityIndex(s.name) >= 0);
            const others = students.filter(s => getPriorityIndex(s.name) < 0);
            
            const sortByEvents = (a, b) => {
                const aCount = countEvents(a.name);
                const bCount = countEvents(b.name);
                if (bCount !== aCount) return bCount - aCount;
                return a.name.localeCompare(b.name);
            };
            
            priority.sort((a, b) => getPriorityIndex(a.name) - getPriorityIndex(b.name));
            others.sort(sortByEvents);
            students = [...priority, ...others];
            
            const teachers = [];
            const regularStudents = [];
            students.forEach(s => {
                if (s.type === 'teacher') {
                    teachers.push(s);
                } else {
                    regularStudents.push(s);
                }
            });
            students = [...regularStudents, ...teachers];

            const grid = document.getElementById('studentsGrid');
            if (!students.length) {
                grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">No students found.</p>';
                return;
            }

            grid.innerHTML = students.map(s => {
                const isStar = s.star && s.type === 'student';
                const isTeacher = s.type === 'teacher';
                const studentClass = s.class || 'Student';
                const achievements = s.achievements ? s.achievements.map(a => `<span class="achievement-tag">${a}</span>`).join('') : '';
                
                let className = 'student-card';
                if (isStar) className += ' star';
                if (isTeacher) className += ' teacher';
                else if (studentClass.toLowerCase()) className += ' ' + studentClass.toLowerCase();
                
                return `
                    <div class="${className}" onclick="viewStudent('${s.name}')">
                        <img src="${s.image || ''}" alt="${s.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27140%27 height=%27140%27%3E%3Ccircle cx=%2770%27 cy=%2770%27 r=%2770%27 fill=%27%23ddd%27/%3E%3C/svg%3E'">
                        <span class="class-badge">${isTeacher ? 'Teacher' : studentClass}</span>
                        <h3>${s.name}${isStar ? '<span class="star-badge">★ STAR</span>' : ''}</h3>
                        <p class="role">${s.role || ''}</p>
                        <div class="achievements">${achievements}</div>
                    </div>`;
            }).join('');
        }

        function viewStudent(name) {
            window.location.href = 'student.html?name=' + encodeURIComponent(name);
        }

        init();
    </script>
</body>
</html>
