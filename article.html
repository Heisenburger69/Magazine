<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Article - Rising Stars Magazine</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" type="image/png" href="assets/images/decorative.png?v=1">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/decorative.png?v=1">
    <link rel="icon" type="image/png" sizes="64x64" href="assets/images/decorative.png?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/decorative.png?v=1">
    <style>
        .article-header { text-align: center; padding: 70px 20px; background: linear-gradient(135deg, var(--primary-black) 0%, #2a2520 100%); }
        .article-header h1 { color: var(--primary-gold); }
        .article-meta { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 16px; }
        .article-content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .article-image-text { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-bottom: 40px; }
        .article-image-text.reverse { direction: rtl; }
        .article-image-text.reverse > * { direction: ltr; }
        .article-image-text img { width: 100%; border-radius: 12px; box-shadow: var(--shadow-md); }
        .article-full-image img { width: 100%; max-height: 500px; object-fit: cover; border-radius: 12px; margin-bottom: 30px; box-shadow: var(--shadow-lg); }
        .slideshow { position: relative; margin-bottom: 40px; }
        .slideshow-images { display: flex; transition: transform 0.5s ease; overflow: hidden; border-radius: 12px; background: #f0f0f0; width: 100%; }
        .slideshow-images img { width: 100%; height: auto; max-height: 500px; object-fit: contain; flex-shrink: 0; background: transparent; }
        .slideshow-nav { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .slideshow-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; cursor: pointer; transition: var(--transition); }
        .slideshow-dot.active { background: var(--primary-gold); }
        .slideshow-arrows { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; padding: 0 10px; pointer-events: none; }
        .slideshow-arrow { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; cursor: pointer; font-size: 18px; pointer-events: auto; transition: var(--transition); }
        .slideshow-arrow:hover { background: var(--primary-gold); }
        .article-video { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 30px; border-radius: 12px; overflow: hidden; }
        .article-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .article-quote { background: var(--bg-white); padding: 24px; border-radius: 12px; border-left: 4px solid var(--primary-gold); margin: 30px 0; font-style: italic; font-size: 18px; }
        .article-quote .quote-author { font-size: 14px; color: #666; margin-top: 12px; font-style: normal; font-weight: 600; }
        .article-students { background: rgba(201,168,76,0.15); padding: 24px; border-radius: 12px; margin: 30px 0; }
        .article-students h3 { font-size: 14px; margin-bottom: 16px; }
        .article-students-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .students-group { margin-bottom: 20px; }
        .group-separator { font-size: 12px; font-weight: 700; color: #555; padding: 8px 12px; margin-bottom: 10px; background: rgba(0,0,0,0.05); border-radius: 4px; }
        .article-organizers { background: rgba(220,20,60,0.1); padding: 24px; border-radius: 12px; margin: 30px 0; border-left: 4px solid #DC143C; }
        .article-organizers h3 { font-size: 14px; margin-bottom: 16px; color: #DC143C; }
        .article-organizers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .student-card-mini { display: flex; align-items: center; gap: 16px; padding: 12px; background: var(--bg-white); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: var(--transition); }
        .student-card-mini:hover { transform: translateX(8px); }
        .student-card-mini img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .student-card-mini-info { flex: 1; }
        .student-card-mini-name { font-weight: 700; font-size: 14px; }
        .student-card-mini-role { font-size: 12px; color: #666; }
        .article-text {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(245,244,240,0.9) 100%);
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
            border-left: 4px solid var(--primary-gold);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .article-text p { font-size: 16px; line-height: 1.8; color: #333; }
        @media (max-width: 768px) { 
            .article-image-text { grid-template-columns: 1fr; } 
            .article-image-text.reverse { direction: ltr; }
            .article-students, .article-organizers { padding: 12px; }
            .article-students h3, .article-organizers h3 { font-size: 12px; margin-bottom: 12px; }
            .article-students-grid, .article-organizers-grid { gap: 8px; }
            .student-card-mini { padding: 6px; gap: 8px; }
            .student-card-mini img { width: 32px; height: 32px; }
            .student-card-mini-name { font-size: 12px; }
            .student-card-mini-role { font-size: 10px; }
            .students-group { margin-bottom: 16px; }
            .group-separator { font-size: 10px; padding: 4px 8px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>
    <div class="bg-stars"></div>

    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="Logo"></a>
            <a href="javascript:void(0)" onclick="window.history.back()" class="btn btn-primary" style="padding:8px 16px;font-size:12px;">&larr; Back</a>
        </div>
    </nav>

    <article>
        <div class="article-header">
            <h1 id="articleTitle">Loading...</h1>
            <p class="article-meta" id="articleMeta">Published in The Rising Times News</p>
        </div>
        <div class="article-content" id="articleContent"></div>
    </article>

    <footer class="footer">
        <div class="container">
            <p><strong>THE RISING TIMES NEWS</strong></p>
            <p>Rising Stars Language School | Futures Education System</p>
            <p>&copy; 2024 All Rights Reserved</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        const articleId = new URLSearchParams(window.location.search).get('id') || '';

        async function init() {
            await DataStore.load();
            loadArticle();
        }

        function loadArticle() {
            const article = DataStore.getEvent(articleId);
            if (!article) {
                document.getElementById('articleTitle').textContent = 'Article Not Found';
                document.getElementById('articleContent').innerHTML = '<p>The requested article could not be found.</p>';
                return;
            }

            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleMeta').textContent = `Published in The Rising Times News | ${article.category || 'News'} | ${article.date || ''}`;

            const content = document.getElementById('articleContent');
            let html = '';

            if (article.elements) {
                article.elements.forEach(el => {
                    switch (el.type) {
                        case 'text':
                            html += `<div class="article-text"><p>${el.content}</p></div>`;
                            break;
                        case 'image':
                            if (el.align === 'full') {
                                html += `<div class="article-full-image"><img src="${el.image}" alt="${el.caption || article.title}" onerror="this.style.display='none'"></div>`;
                            } else {
                                const reverse = el.align === 'right' ? ' reverse' : '';
                                html += `<div class="article-image-text${reverse}"><img src="${el.image}" alt="${el.caption || article.title}" onerror="this.style.display='none'"><div>${el.caption ? `<p>${el.caption}</p>` : ''}</div></div>`;
                            }
                            break;
                        case 'slideshow':
                            if (el.images && el.images.length) {
                                const slideId = 'slideshow-' + Math.random().toString(36).substr(2, 9);
                                const slides = el.images.map((img, i) => `<img src="${img}" alt="Slide ${i+1}" class="slide" style="display:${i===0?'block':'none'}">`).join('');
                                const dots = el.images.map((_, i) => `<div class="slideshow-dot" data-slide="${slideId}" data-index="${i}" onclick="goSlide('${slideId}', ${i})" style="${i===0?'background:var(--primary-gold)':''}"></div>`).join('');
                                html += `<div class="slideshow"><div class="slideshow-images" id="${slideId}" style="border-radius:12px;overflow:hidden;">${slides}</div><div class="slideshow-arrows" style="position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 10px;pointer-events:none;"><button class="slideshow-arrow" onclick="prevSlide('${slideId}')" style="pointer-events:auto;">&lsaquo;</button><button class="slideshow-arrow" onclick="nextSlide('${slideId}')" style="pointer-events:auto;">&rsaquo;</button></div><div class="slideshow-nav">${dots}</div></div>`;
                                if (el.caption) html += `<p style="text-align:center;color:#666;margin-bottom:30px;margin-top:-25px;position:relative;z-index:1;">${el.caption}</p>`;
                            }
                            break;
                        case 'video':
                            if (el.video) {
                                const videoIds = el.video.split(',').map(v => v.trim()).filter(v => v);
                                if (videoIds.length > 1) {
                                    html += `<div class="article-video-row" style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:30px 0;">`;
                                    videoIds.forEach(videoId => {
                                        const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?rel=0&enablejsapi=1&origin=${window.location.origin}`;
                                        html += `<div style="position:relative;padding-bottom:56.25%;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-md);">
                                            <iframe width="100%" height="100%" style="position:absolute;top:0;left:0;height:100%;" src="${embedUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                                        </div>`;
                                    });
                                    html += `</div>`;
                                } else {
                                    const videoId = videoIds[0];
                                    const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?rel=0&enablejsapi=1&origin=${window.location.origin}`;
                                    html += `<div class="article-video" style="margin: 30px 0; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-md);">
                                    <iframe 
                                        width="100%" 
                                        height="500" 
                                        src="${embedUrl}" 
                                        title="YouTube video player" 
                                        frameborder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                        allowfullscreen>
                                    </iframe>
                                </div>`;
                                }
                            }
                            break;
                        case 'quote':
                            html += `<div class="article-quote">"${el.quote}"${el.author ? `<div class="quote-author">— ${el.author}</div>` : ''}</div>`;
                            break;
                        case 'students':
                            if (el.students && el.students.length) {
                                let studentsHtml = '<div class="article-students"><h3>Students in this article:</h3>';
                                
                                const secondary = [], preparatory = [], primary = [], other = [];
                                el.students.forEach(s => {
                                    const student = DataStore.getStudent(s.name);
                                    const studentClass = (student?.class || 'other').toString().toLowerCase();
                                    if (student?.type === 'teacher' || studentClass === 'teacher') {
                                        other.push(s);
                                    } else if (studentClass === 'secondary') {
                                        secondary.push(s);
                                    } else if (studentClass === 'preparatory') {
                                        preparatory.push(s);
                                    } else if (studentClass === 'primary') {
                                        primary.push(s);
                                    } else {
                                        other.push(s);
                                    }
                                });
                                
                                const renderGroup = (students, title, color) => {
                                    if (!students.length) return '';
                                    return `<div class="students-group">
                                        <div class="group-separator" style="border-left: 4px solid ${color};">${title}</div>
                                        <div class="article-students-grid">` +
                                        students.map(s => {
                                            const student = DataStore.getStudent(s.name);
                                            const img = student?.image || '';
                                            const isStar = student?.star && student?.type === 'student';
                                            return `<div class="student-card-mini" onclick="viewStudent('${s.name}')">
                                                <img src="${img}" alt="${s.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2750%27 height=%2750%27%3E%3Ccircle cx=%2725%27 cy=%2725%27 r=%2725%27 fill=%27%23ddd%27/%3E%3C/svg%3E'">
                                                <div class="student-card-mini-info">
                                                    <div class="student-card-mini-name">${s.name} ${isStar ? '★' : ''}</div>
                                                    <div class="student-card-mini-role">${s.role || 'Student'} ${s.achievement ? '- ' + s.achievement : ''}</div>
                                                </div>
                                            </div>`;
                                        }).join('') + '</div></div>';
                                };
                                
                                studentsHtml += renderGroup(secondary, 'Secondary', '#333');
                                studentsHtml += renderGroup(preparatory, 'Preparatory', '#2A6B54');
                                studentsHtml += renderGroup(primary, 'Primary', '#4299E1');
                                studentsHtml += renderGroup(other, 'Other', '#8B3A5C');
                                studentsHtml += '</div>';
                                html += studentsHtml;
                            }
                            break;
                        case 'organizers':
                            if (el.organizers && el.organizers.length) {
                                let orgHtml = '<div class="article-organizers"><h3 style="color:#DC143C;">Organizers / Teachers:</h3><div class="article-organizers-grid">';
                                el.organizers.forEach(s => {
                                    const student = DataStore.getStudent(s.name);
                                    const img = student?.image || '';
                                    const isStar = student?.star && student?.type === 'student';
                                    orgHtml += `
                                        <div class="student-card-mini" onclick="viewStudent('${s.name}')">
                                            <img src="${img}" alt="${s.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2750%27 height=%2750%27%3E%3Ccircle cx=%2725%27 cy=%2725%27 r=%2725%27 fill=%27%23ddd%27/%3E%3C/svg%3E'">
                                            <div class="student-card-mini-info">
                                                <div class="student-card-mini-name">${s.name} ${isStar ? '★' : ''}</div>
                                                <div class="student-card-mini-role">${s.role || 'Teacher'} ${s.achievement ? '- ' + s.achievement : ''}</div>
                                            </div>
                                        </div>`;
                                });
                                orgHtml += '</div></div>';
                                html += orgHtml;
                            }
                            break;
                    }
                });
            }

            content.innerHTML = html;
        }

        function goSlide(slideId, n) {
            const container = document.getElementById(slideId);
            const slides = container.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.slideshow-dot[data-slide="' + slideId + '"]');
            let current = 0;
            dots.forEach((d, i) => {
                if (d.classList.contains('active')) current = i;
            });
            current = (n + slides.length) % slides.length;
            slides.forEach((s, i) => s.style.display = i === current ? 'block' : 'none');
            dots.forEach((d, i) => {
                d.style.background = i === current ? 'var(--primary-gold)' : '#ddd';
                d.classList.toggle('active', i === current);
            });
        }
        function nextSlide(slideId) {
            const slides = document.querySelectorAll('#' + slideId + ' .slide');
            const dots = document.querySelectorAll('.slideshow-dot[data-slide="' + slideId + '"]');
            let current = 0;
            dots.forEach((d, i) => {
                if (d.classList.contains('active')) current = i;
            });
            goSlide(slideId, current + 1);
        }
        function prevSlide(slideId) {
            const slides = document.querySelectorAll('#' + slideId + ' .slide');
            const dots = document.querySelectorAll('.slideshow-dot[data-slide="' + slideId + '"]');
            let current = 0;
            dots.forEach((d, i) => {
                if (d.classList.contains('active')) current = i;
            });
            goSlide(slideId, current - 1);
        }

        function viewStudent(name) {
            window.location.href = 'student.html?name=' + encodeURIComponent(name);
        }

        init();
    </script>
</body>
</html>
