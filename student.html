<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - Rising Stars Magazine</title>
    <meta name="description" content="Read the latest news, achievements, and event coverage from Rising Stars Language School. Student stories, competitions, cultural events and more.">
    <meta property="og:title" content="Student Profile - Rising Stars Magazine">
    <meta property="og:description" content="Stay updated with the latest news and achievements from Rising Stars Language School.">
    <meta property="og:url" content="https://therisingtimes.vercel.app/">
    <meta property="og:image" content="https://therisingtimes.vercel.app/assets/images/logo1.png">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" type="image/png" href="assets/images/decorative.png?v=1">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/decorative.png?v=1">
    <link rel="icon" type="image/png" sizes="64x64" href="assets/images/decorative.png?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/decorative.png?v=1">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
        .profile-header { background: linear-gradient(135deg, var(--primary-black) 0%, #2a2520 100%); padding: 70px 20px; text-align: center; }
        .profile-header h1 { color: var(--primary-gold); }
        .profile-header img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-gold); box-shadow: 0 6px 24px rgba(201,168,76,0.4); margin-bottom: 20px; }
        .profile-header .role { font-size: 16px; color: rgba(255,255,255,0.7); font-style: italic; margin-bottom: 12px; }
        .profile-achievements { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 16px; }
        .profile-achievements .achievement-tag { background: var(--primary-gold); color: var(--primary-black); padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; }
        .profile-content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .profile-quote { background: var(--bg-white); padding: 24px; border-radius: 12px; font-size: 18px; font-style: italic; color: #333; border-left: 4px solid var(--primary-gold); margin-bottom: 30px; }
        .event-mini { background: var(--bg-white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition); }
        .event-mini:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .event-mini-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .event-mini-excerpt { font-size: 11px; color: #555; margin-bottom: 8px; }
        .cse-event-mini { background: linear-gradient(135deg, rgba(155,89,182,0.15) 0%, rgba(142,68,173,0.1) 100%); border-left: 4px solid #9B59B6; border-radius: 12px; cursor: pointer; }
        .cse-event-mini:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .top-student-event-mini { background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(184,134,11,0.1) 100%); border-left: 4px solid #D4AF37; border-radius: 12px; cursor: pointer; }
        .top-student-event-mini:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        #eventsList { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (max-width: 768px) { #eventsList { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .profile-header img { width: 140px; height: 140px; } .profile-header h1 { font-size: 28px; } }
    </style>
</head>
<body>
    <div class="bg-stars"></div>

    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="Logo"></a>
            <a href="javascript:void(0)" onclick="window.history.back()" class="btn btn-primary" style="padding:8px 16px;font-size:12px;">&larr; Back</a>
        </div>
    </nav>

    <div class="profile-header">
        <img src="" alt="Student" id="profileImage" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27180%27 height=%27180%27%3E%3Ccircle cx=%2790%27 cy=%2790%27 r=%2790%27 fill=%27%23ddd%27/%3E%3C/svg%3E'">
        <h1 id="profileName">Loading...</h1>
        <p class="role" id="profileRole"></p>
        <div id="profileAchievements"></div>
    </div>

    <div class="profile-content">
        <div class="profile-quote" id="profileQuote"></div>
        <div class="events-section">
            <h2>Events</h2>
            <div id="eventsList"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p><strong>THE RISING TIMES NEWS</strong></p>
            <p>Rising Stars Language School</p>
            <p>&copy; 2026 All Rights Reserved</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        const studentName = new URLSearchParams(window.location.search).get('name') || '';

        async function init() {
            await DataStore.load();
            DataStore.getCSECouncil();
            loadProfile();
        }

        function loadProfile() {
            const student = DataStore.getStudent(studentName);
            if (!student) {
                document.getElementById('profileName').textContent = studentName || 'Student Not Found';
                document.getElementById('eventsList').innerHTML = '<p>No student found.</p>';
                return;
            }

            document.getElementById('profileName').innerHTML = student.name + (student.star && student.type === 'student' ? ' <span class="star-badge">★ Star</span>' : '');
            document.getElementById('profileRole').textContent = student.role || '';
            document.getElementById('profileQuote').textContent = '"' + student.quote + '"';
            document.getElementById('profileImage').src = student.image || '';
            
            const achievementsHtml = student.achievements && student.achievements.length 
                ? `<div class="profile-achievements">${student.achievements.map(a => `<span class="achievement-tag">${a}</span>`).join('')}</div>`
                : '';
            document.getElementById('profileAchievements').innerHTML = achievementsHtml;

            const studentEvents = DataStore.getStudentEvents(studentName);
            const eventsList = document.getElementById('eventsList');

            if (studentEvents.length > 0) {
                eventsList.innerHTML = studentEvents.map(event => {
                    const excerpt = DataStore.getEventExcerpt(event);
                    const thumb = DataStore.getEventPreviewImage(event);
                    
                    let studentInfo = null;
                    let foundAsOrganizer = false;
                    if (event.elements) {
                        for (const el of event.elements) {
                            if (el.type === 'students' && el.students) {
                                studentInfo = el.students.find(s => s.name === studentName);
                                if (studentInfo) break;
                            }
                            if (el.type === 'organizers' && el.organizers) {
                                studentInfo = el.organizers.find(s => s.name === studentName);
                                if (studentInfo) { foundAsOrganizer = true; break; }
                            }
                        }
                    }
                    
                    const st = DataStore.getStudent(studentName);
                    const roleText = studentInfo?.role ? studentInfo.role : (foundAsOrganizer ? (st?.role || 'Teacher') : 'Participant');
                    const achieveText = studentInfo?.achievement ? `- ${studentInfo.achievement}` : '';
                    const isCSE = event._isCSE;
                    const isTopStudent = event._isTopStudent;
                    const cseRole = event._cseRole || {};
                    const topRole = event._topRole || {};
                    const roleTitle = isTopStudent ? topRole.title : (cseRole.title || 'CSE Council Member');
                    const roleIcon = isTopStudent ? topRole.icon : (cseRole.icon || '👑');
                    const isSpecial = isCSE || isTopStudent;
                    const onclickAttr = isCSE ? "window.location.href='cse-council.html'" : (isTopStudent ? "viewArticle('top-students-competition')" : "viewArticle('" + event.id + "')");
                    const excerptText = isTopStudent ? 'Recognized for outstanding achievement' : (isCSE ? 'Cultural, Scientific & Educational Council' : excerpt);
                    const accentColor = isTopStudent ? '#D4AF37' : (isCSE ? '#9B59B6' : '#DC143C');
                    const thumbHtml = isCSE ? `<div style="width:60px;height:45px;min-width:60px;background:linear-gradient(135deg, #9B59B6, #8E44AD);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;">${roleIcon}</div>` : 
                                       (isTopStudent ? `<div style="width:60px;height:45px;min-width:60px;background:linear-gradient(135deg, #D4AF37, #B8860B);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;">${roleIcon}</div>` : 
                                       (thumb ? `<img src="${thumb}" style="width:60px;height:45px;object-fit:cover;border-radius:8px;flex-shrink:0;" onerror="this.style.display='none'">` : ''));
                    return `
                        <div class="event-mini ${isCSE ? 'cse-event-mini' : ''} ${isTopStudent ? 'top-student-event-mini' : ''}" onclick="${onclickAttr}">
                            <div style="display:flex;gap:16px;align-items:flex-start;">
                                ${thumbHtml}
                                <div style="flex:1;">
                                    <div class="event-mini-title">${event.title}</div>
                                    <div style="font-size:11px;color:${accentColor};font-weight:600;margin:3px 0;">${isSpecial ? roleTitle : roleText + ' ' + achieveText}</div>
                                    <div class="event-mini-excerpt" style="font-size:10px;">${excerptText}</div>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            } else {
                eventsList.innerHTML = '<p>No events found for this student.</p>';
            }
        }

        function viewArticle(id) {
            window.location.href = 'article.html?id=' + id;
        }

        init();
    </script>
</body>
</html>
